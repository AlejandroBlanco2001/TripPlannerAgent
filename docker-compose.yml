services:
  agent:
    build:
      context: .
      dockerfile: dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - phoenix
  phoenix:
    image: arizephoenix/phoenix:latest
    env_file:
      - ./.env
    depends_on:
      - db
    ports:
      - 6006:6006
      - 4317:4317
  db:
    image: postgres:18
    restart: always
    env_file:
      - ./.env
    ports:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql
volumes:
  postgres_data:
    driver: local
