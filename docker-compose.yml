services:
  agent:
    build:
      context: .
      dockerfile: dockerfile
    env_file:
      - ./.env
    environment:
      SESSION_SERVICE_URI: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@agent_db:5432/${POSTGRES_DB:-postgres}
    ports:
      - "8000:8000"
    depends_on:
      - agent_db
      - phoenix
  phoenix:
    image: arizephoenix/phoenix:latest
    env_file:
      - ./.env
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@phoenix_db:5432/${POSTGRES_DB:-postgres}
    depends_on:
      - phoenix_db
    ports:
      - 6006:6006
      - 4317:4317
  agent_db:
    image: postgres:18
    restart: always
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - agent_postgres_data:/var/lib/postgresql
  phoenix_db:
    image: postgres:18
    restart: always
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    volumes:
      - phoenix_postgres_data:/var/lib/postgresql
volumes:
  agent_postgres_data:
    driver: local
  phoenix_postgres_data:
    driver: local
